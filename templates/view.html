{% extends "base.html" %}
{% block title %}Viewing {{ log_name }} - Log Viewer{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>{{ log_name }}</h2>
    <div>
        <a href="/download/{{ log_id }}" class="btn btn-secondary">Download Log</a>
        <a href="/" class="btn btn-outline-primary">Back to Dashboard</a>
    </div>
</div>

<div class="row mb-3">
    <div class="col-md-6">
        <div class="input-group">
            <input type="text" id="searchInput" class="form-control" placeholder="Search in log...">
            <button class="btn btn-primary" onclick="searchLog()">Search</button>
        </div>
    </div>
    <div class="col-md-6 text-end">
        <div class="btn-group" role="group">
            <button type="button" class="btn btn-outline-info" onclick="analyzeLog('day')">Last Day</button>
            <button type="button" class="btn btn-outline-info" onclick="analyzeLog('week')">Last Week</button>
            <button type="button" class="btn btn-outline-info" onclick="analyzeLog('month')">Last Month</button>
        </div>
    </div>
</div>

<div id="analysisResult" class="alert alert-info d-none mb-3">
    <strong>Unique Visitors:</strong>
    <button class="btn btn-sm btn-outline-secondary float-end" onclick="resetFilter()">Show All</button>
    <div id="visitorList" class="mt-2"></div>
</div>

<div id="logContainer" class="log-container"></div>

{% endblock %}

{% block scripts %}
<script>
    const logId = {{ log_id }};
    const logContainer = document.getElementById('logContainer');
    let lastSize = 0;
    let currentFilter = null;

    function getVisitorFromLine(line) {
        // Regex to extract timestamp, IP, and username
        // 2026-01-06 09:34:17,365 - kc-portal - INFO - IP: 104.51.149.143 (Mac) - Anonymous - GET /
        const match = line.match(/^(\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}) - .*? - .*? - IP: (.*?) \(.*?\) - (.*?) - /);
        if (match) {
            const ip = match[2];
            const username = match[3];
            return username === "Anonymous" ? ip : username;
        }
        return null;
    }

    function applyFilter(div) {
        if (!currentFilter) {
            div.style.display = '';
            return;
        }
        const visitor = div.getAttribute('data-visitor');
        if (visitor === currentFilter) {
            div.style.display = '';
        } else {
            div.style.display = 'none';
        }
    }

    function filterByVisitor(visitor) {
        currentFilter = visitor;
        for (let div of logContainer.children) {
            applyFilter(div);
        }
    }

    function resetFilter() {
        currentFilter = null;
        for (let div of logContainer.children) {
            div.style.display = '';
        }
    }

    async function fetchLog() {
        try {
            const response = await fetch(`/log-stream/${logId}?last_size=${lastSize}`);
            const data = await response.json();

            if (data.content) {
                const lines = data.content.split('\n');
                lines.forEach(line => {
                    if (line.length > 0) {
                        const div = document.createElement('div');
                        div.innerText = line;
                        const visitor = getVisitorFromLine(line);
                        if (visitor) {
                            div.setAttribute('data-visitor', visitor);
                        }
                        applyFilter(div);
                        logContainer.appendChild(div);
                    }
                });
                logContainer.scrollTop = logContainer.scrollHeight;
                lastSize = data.new_size;
            }
        } catch (e) {
            console.error("Error fetching log", e);
        }
    }

    function searchLog() {
        const term = document.getElementById('searchInput').value.toLowerCase();
        for (let line of logContainer.children) {
            if (term && line.innerText.toLowerCase().includes(term)) {
                line.classList.add('search-highlight');
            } else {
                line.classList.remove('search-highlight');
            }
        }
    }

    async function analyzeLog(period) {
        const resultDiv = document.getElementById('analysisResult');
        const visitorDiv = document.getElementById('visitorList');
        
        try {
            const response = await fetch(`/analyze-log/${logId}?period=${period}`);
            const data = await response.json();
            
            if (data.users) {
                visitorDiv.innerHTML = '';
                if (data.users.length > 0) {
                    data.users.forEach(user => {
                        const btn = document.createElement('button');
                        btn.className = 'btn btn-sm btn-info me-1 mb-1';
                        btn.innerText = user;
                        btn.onclick = () => filterByVisitor(user);
                        visitorDiv.appendChild(btn);
                    });
                } else {
                    visitorDiv.innerText = 'None found';
                }
                resultDiv.classList.remove('d-none');
            } else if (data.error) {
                alert(data.error);
            }
        } catch (e) {
            console.error("Error analyzing log", e);
            alert("Error analyzing log");
        }
    }

    // Initial load and then tail -f behavior
    setInterval(fetchLog, 2000);
    fetchLog();
</script>
{% endblock %}
